name: publish

# Публикация в PyPI по тегу вида v1.0.0a5.
# Используется Trusted Publishing (OIDC): API-токен в секретах не нужен.
# Перед первым запуском зарегистрируйте publisher на https://pypi.org/manage/account/publishing/
#   PyPI Project Name: backtrader-quik
#   Owner: Celeevo
#   Repository name: backtrader-quik
#   Workflow name: publish.yml
#   Environment name: pypi

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build
        run: python -m build
      - name: Check metadata
        run: python -m twine check dist/*
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # tomllib появился только в 3.11, а сборка идёт на 3.10, поэтому
          # версия читается регуляркой из built metadata.
          PKG=$(python -c "import re,pathlib;print(re.search(r'^version = \"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text(), re.M).group(1))")
          echo "tag=$TAG pyproject=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match pyproject version $PKG"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
